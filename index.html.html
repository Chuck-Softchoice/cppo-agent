<html lang="en">

<meta charset="UTF-8">

<title>AWS Marketplace CPPO Availability Agent</title>
<style>
  

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --aws-orange: #FF9900;
    --aws-dark: #0f1117;
    --aws-darker: #080b10;
    --aws-surface: #161b24;
    --aws-border: rgba(255,153,0,0.15);
    --aws-border-strong: rgba(255,153,0,0.35);
    --text-primary: #e8eaf0;
    --text-secondary: #8a919e;
    --text-muted: #4a5260;
    --user-bg: rgba(255,153,0,0.08);
    --user-border: rgba(255,153,0,0.25);
    --agent-bg: rgba(255,255,255,0.03);
    --agent-border: rgba(255,255,255,0.07);
    --green: #00d4a0;
    --green-bg: rgba(0,212,160,0.07);
    --green-border: rgba(0,212,160,0.2);
  }

  html, body {
    height: 100%;
    background: var(--aws-darker);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,153,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,153,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  /* Header */
  .header {
    padding: 1.5rem 0 1.25rem;
    border-bottom: 1px solid var(--aws-border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    background: var(--aws-orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  .logo-mark svg { width: 22px; height: 22px; fill: #fff; position: relative; z-index: 1; }

  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .header-sub {
    font-size: 11.5px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  }

  .status-pill {
    font-size: 10px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    font-weight: 500;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 99px;
    padding: 3px 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--aws-border) transparent;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--aws-border); border-radius: 4px; }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg-label {
    font-size: 10px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0 2px;
  }

  .msg.user { align-items: flex-end; }
  .msg.user .msg-label { color: rgba(255,153,0,0.4); }

  .bubble {
    padding: 11px 15px;
    border-radius: 2px 12px 12px 12px;
    font-size: 13.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    max-width: 88%;
    background: var(--agent-bg);
    border: 1px solid var(--agent-border);
    color: var(--text-primary);
  }

  .msg.user .bubble {
    border-radius: 12px 2px 12px 12px;
    background: var(--user-bg);
    border-color: var(--user-border);
    color: var(--aws-orange);
    max-width: 75%;
  }

  /* Quick buttons */
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  .quick-btn {
    font-size: 12px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    padding: 5px 13px;
    border: 1px solid var(--aws-border-strong);
    background: transparent;
    color: var(--aws-orange);
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .quick-btn:hover { background: rgba(255,153,0,0.08); border-color: var(--aws-orange); }

  /* Input row */
  .input-area {
    padding: 1rem 0 1.25rem;
    border-top: 1px solid var(--aws-border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--aws-surface);
    border: 1px solid var(--aws-border);
    border-radius: 10px;
    padding: 4px 4px 4px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--aws-border-strong); }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text-primary);
    padding: 7px 0;
  }
  .input-row input::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--aws-orange);
    border: none;
    border-radius: 7px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .footer-note {
    text-align: center;
    font-size: 10.5px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
</style>

function norm(s) {
  return s.toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

function levenshtein(a, b) {
  const m=a.length, n=b.length, dp=[];
  for(let i=0;i<=m;i++){dp[i]=[i];for(let j=1;j<=n;j++)dp[i][j]=i===0?j:0;}
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findMatch(query) {
  const q = norm(query);
  let bestClose=null, bestDist=Infinity;
  for(const v of PDF_VENDORS) {
    const vn = norm(v);
    if(vn === q) return {type:'exact', name:v};
    if(vn.includes(q) || q.includes(vn)) {
      const d = levenshtein(q,vn);
      if(d < bestDist){bestDist=d; bestClose=v;}
      continue;
    }
    const d = levenshtein(q,vn);
    const thresh = Math.max(3, Math.floor(Math.max(q.length,vn.length)*0.28));
    if(d <= thresh && d < bestDist){bestDist=d; bestClose=v;}
  }
  if(bestClose) return {type:'close', name:bestClose};
  return {type:'none', name:null};
}

function notFoundResponse(isvName) {

}

  const lbl = document.createElement('div'); lbl.className='msg-label'; lbl.textContent=role==='agent'?'Agent':'You';
  const bub = document.createElement('div'); bub.className='bubble'; bub.textContent=text;
  div.appendChild(lbl); div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function agentMsg(text, btns) { addMsg('agent', text); setQuickBtns(btns||[]); }

function setQuickBtns(opts) {
  const c = document.getElementById('quickBtns'); c.innerHTML='';
  opts.forEach(o => {
    const b = document.createElement('button'); b.className='quick-btn'; b.textContent=o;
    b.onclick = () => { document.getElementById('userInput').value=o; handleSend(); };
    c.appendChild(b);
  });
}

function restartTopic() {
  state = {phase:'awaiting_isv', userISV:'', pdfMatch:null};
  agentMsg('What is the name of the ISV you would like to check?', []);
}

function processISV(isvName) {
  state.userISV = isvName;
  const result = findMatch(isvName);

  if(result.type === 'exact') {
    state.pdfMatch = result.name;
    agentMsg(`Yes ${result.name} is available on AWS Marketplace and has transacted channel partner private offers (CPPOs) before.\n\nThis vendor appears on the current list of vendors supporting CPPOs in AWS Marketplace.\n\nIf you have an opportunity with a client who would like to transact ${result.name} in AWS Marketplace, an AWS Marketplace presales specialist can assist you with next steps.\n\n${CASE_PATH}`, ['Check another vendor','Done']);
    state.phase = 'done_offer_restart'; return;
  }

  if(result.type === 'close') {
    state.pdfMatch = result.name;
    agentMsg(`I wasn't able to find an exact match for ${isvName} on the current list of vendors supporting CPPOs in AWS Marketplace, but I found ${result.name}, which is close.\n\nDo you wish to know if ${result.name} is available on AWS Marketplace?`, ['Yes','No']);
    state.phase = 'confirm_close_pdf'; return;
  }

  agentMsg(notFoundResponse(isvName), ['Yes','No']);
  state.phase = 'not_found_offer_case';
}

function handleUserResponse(text) {
  const t = text.trim().toLowerCase();
  const {userISV:isv, pdfMatch:pdf} = state;

  if(state.phase === 'awaiting_isv') { processISV(text); return; }

  if(state.phase === 'confirm_close_pdf') {
    if(t==='yes'||t.startsWith('yes')) {
      agentMsg(`Yes ${pdf} is available on AWS Marketplace and has transacted channel partner private offers (CPPOs) before.\n\nThis vendor appears on the current list of vendors supporting CPPOs in AWS Marketplace.\n\nIf you have an opportunity with a client who would like to transact ${pdf} in AWS Marketplace, an AWS Marketplace presales specialist can assist you with next steps.\n\n${CASE_PATH}`, ['Check another vendor','Done']);
      state.phase = 'done_offer_restart';
    } else {
      agentMsg(notFoundResponse(isv), ['Yes','No']);
      state.phase = 'not_found_offer_case';
    }
    return;
  }

  if(state.phase === 'not_found_offer_case') {
    if(t==='yes'||t.startsWith('yes')) {
      agentMsg(CASE_PATH, ['Check another vendor','Done']);
      state.phase = 'done_offer_restart';
    } else {
      agentMsg('Would you like to search for another vendor?', ['Yes','No']);
      state.phase = 'offer_restart';
    }
    return;
  }

  if(state.phase==='offer_restart') {
    if(t==='yes'||t.startsWith('yes')||t.includes('another')) restartTopic();
    else { agentMsg('Understood. Reach out anytime if you need another CPPO check. Goodbye!', []); state.phase='ended'; }
    return;
  }

  if(state.phase==='done_offer_restart') {
    if(t.includes('another')||t==='yes') restartTopic();
    else { agentMsg('Understood. Reach out anytime if you need another CPPO check. Goodbye!', []); state.phase='ended'; }
    return;
  }

  if(state.phase==='ended') { agentMsg('To start a new search, just type a vendor name.', []); state.phase='awaiting_isv'; }
}

function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  addMsg('user', text); input.value=''; setQuickBtns([]);
  handleUserResponse(text);
}

document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') handleSend(); });
document.getElementById('sendBtn').addEventListener('click', handleSend);

agentMsg('Hello! I can check whether a software vendor supports Channel Partner Private Offers (CPPOs) on AWS Marketplace.\n\nWhat is the name of the ISV you would like to check?', []);
</script>
